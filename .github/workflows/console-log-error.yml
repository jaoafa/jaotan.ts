name: Check using console.log

on:
  pull_request_target:

# ワークフロー全体のデフォルト権限を無効化（各ジョブで最小権限を明示する）
permissions: {}

jobs:
  # フォーク PR の場合、承認リクエストコメントを投稿する
  post-approval-request:
    name: Post approval request
    runs-on: ubuntu-latest
    # フォーク PR のときのみ承認リクエストを投稿する（同一リポジトリからの PR は不要）
    if: github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Find existing approval request comment
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: Environment 承認待ち

      - name: Post or update approval request comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ## Environment 承認待ち

            この PR のチェックを実行するには、Environment `fork-pr-build` の承認が必要です。

            [Actions run を確認して承認してください](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}?pr=${{ github.event.pull_request.number }})

  check-import:
    runs-on: ubuntu-latest
    needs: post-approval-request
    # post-approval-request の結果に関わらず常に実行する
    # セキュリティゲートは environment: が担保するため、コメント投稿の失敗でスキップされてはならない
    if: always()
    # フォーク PR の場合のみ Environment で手動承認が必要（同一リポジトリからの PR は不要）
    environment: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository && 'fork-pr-build' || null }}
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1

      - name: Check using console.log
        run: |
          COUNT=`grep -rEn "console.log" --include=*.ts src | tee ../console-log.txt | wc -l || true`
          echo count: $COUNT
          cat ../console-log.txt
          cat ../console-log.txt | reviewdog -efm="%f:%l:%m" -name="Check using console.log" -reporter=github-pr-review -level=warning
          if [ "$COUNT" != "0" ]; then
            echo "Found console.log in $COUNT files"
            exit 1
          fi
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
