# 任意のレジストリに Docker image を公開orビルドする。
# プルリクの作成・更新時に動作する。

name: Docker

on:
  pull_request:
    branches:
      - main
      - master
    types:
      - opened
      - synchronize
    paths:
      - .github/workflows/docker.yml
  pull_request_target:
    branches:
      - main
      - master
    types:
      - opened
      - synchronize
      - reopened
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.merged == true && github.base_ref || github.event.pull_request.head.sha }}

jobs:
  # フォーク PR の場合、承認リクエストコメントを投稿する
  post-approval-request:
    name: Post approval request
    runs-on: ubuntu-latest
    # フォーク PR のときのみ承認リクエストを投稿する（同一リポジトリからの PR は不要）
    # closed（マージ済み）の場合は承認不要のため除外する
    if: github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository && github.event.pull_request.merged != true
    permissions:
      pull-requests: write
    steps:
      - name: Find existing approval request comment
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: Environment 承認待ち

      - name: Post or update approval request comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ## Environment 承認待ち

            この PR の Docker ビルドを実行するには、Environment `fork-pr-build` の承認が必要です。

            [Actions run を確認して承認してください](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}?pr=${{ github.event.pull_request.number }})

  docker-ci:
    name: Docker CI
    needs: post-approval-request
    # post-approval-request が skipped（push・同一リポジトリ PR 等）または success（フォーク PR）のときのみ実行する
    if: always() && (needs.post-approval-request.result == 'success' || needs.post-approval-request.result == 'skipped')
    # フォーク PR の場合のみ Environment で手動承認が必要（同一リポジトリからの PR・マージ済み PR は不要）
    environment: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository && github.event.pull_request.merged != true && 'fork-pr-build' || null }}
    uses: book000/templates/.github/workflows/reusable-docker.yml@master
    with:
      targets: >-
        [
          { imageName: "jaoafa/jaotan.ts", context: ".", file: "Dockerfile", packageName: "jaotan.ts" }
        ]
    secrets:
      DOCKER_USERNAME: ${{ github.actor }}
      DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
